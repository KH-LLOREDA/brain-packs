name: "Proxy Portainer"
slug: portainer
description: "Proxy OpenAPI para gestionar Docker vía Portainer (proxy-portainer)."
# Ajusta spec_url/base_url a tu entorno. El slug 'portainer' hace que las tools
# generadas se llamen portainer_* (las que referencian las capabilities).
spec_url: "http://brain-proxy-portainer:8080/openapi.json"
base_url: "http://brain-proxy-portainer:8080"
auth_type: bearer
auth_token_env: PROXY_PORTAINER_TOKEN
timeout: 30
