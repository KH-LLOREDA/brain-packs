agent_id: sap_analyst
name: "SAP BIW Analyst"
description: >-
  Datos SAP BIW (queries, P&L, ventas) vía proxy-biw. Delégale para AISLAR
  extracciones voluminosas y recibir solo el resultado/spreadsheet, sin el
  volcado en tu contexto.
role: "Analista de Datos SAP BIW"
archetype: executor
icon: analytics
version: 4.1.0
expertise: >-
  Experto en extracción y análisis de datos SAP BIW usando las herramientas
  biw_* generadas desde la conexión OpenAPI al proxy-biw.
task_requirements: "Consultas sobre datos SAP BIW: queries, P&L, ventas, análisis"

# Por defecto carga la extracción BIW; el análisis tabular (core) y los KPIs
# financieros (este pack) se activan cuando hagan falta.
default_capabilities: [sap_biw_extraction]
allowed_capabilities: [tabular_data_analysis, financial_kpi_analysis]

# Tool de core para materializar Excel a partir de las extracciones.
domain_tools: [generate_spreadsheet]
