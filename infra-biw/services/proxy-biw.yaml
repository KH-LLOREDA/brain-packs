slug: proxy-biw
# Imagen del proxy-biw (Node/Express + Angular embebido, puerto 3000).
# La publica el CI del repo proxy-biw: rama main -> tag 'latest'. El tag debe
# incluir la paridad de despliegue (ensureToken + admin seguro + jwtOrBearer +
# operationIds en /openapi.json).
image: registry.khlloreda.es/proxy-biw:latest
ports: [3000]
# PROXY_BIW_TOKEN lo GENERA Brain en la instalación (generate_secrets) y lo
# inyecta como env; el proxy lo siembra en su tabla api_tokens al arrancar
# (bootstrap) y Brain lo usa como credencial de la conexión. Cero preguntas.
env: [PROXY_BIW_TOKEN]
generate_secrets: [PROXY_BIW_TOKEN]
healthcheck:
  path: /health
  port: 3000
scope: shared
provides:
  connection:
    kind: openapi
    slug: biw
    name: "Proxy BIW"
    spec_path: /openapi.json
    auth_type: bearer
    auth_token_env: PROXY_BIW_TOKEN
